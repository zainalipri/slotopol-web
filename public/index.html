<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slotopol - Casino Games</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Login Screen -->
  <div id="login-screen" class="screen active">
    <div class="login-container">
      <div class="login-logo">
        <div class="logo-icon">🎰</div>
        <h1>SLOTOPOL</h1>
        <p class="logo-subtitle">Game Server Interface</p>
      </div>
      <div class="login-form">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-email" value="player@example.org" placeholder="Enter email">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" value="iVI05M" placeholder="Enter password">
        </div>
        <div class="form-hint">Demo accounts: admin / dealer / player</div>
        <button id="login-btn" class="btn btn-primary btn-full" onclick="login()">
          <span class="btn-text">Enter Casino</span>
          <span class="btn-loader" style="display:none">⟳</span>
        </button>
        <div id="login-error" class="error-msg"></div>
      </div>
    </div>
  </div>

  <!-- Main App Screen -->
  <div id="app-screen" class="screen">
    <!-- Top Bar -->
    <header class="topbar">
      <div class="topbar-left">
        <div class="topbar-logo">🎰 Slotopol</div>
        <nav class="topbar-nav">
          <button class="nav-btn active" onclick="showView('browser')" id="nav-browser">Games</button>
          <button class="nav-btn" onclick="showView('slot')" id="nav-slot">Slot Machine</button>
        </nav>
      </div>
      <div class="topbar-right">
        <div class="wallet-display" id="wallet-display">
          <span class="wallet-label">Balance</span>
          <span class="wallet-value" id="wallet-value">0</span>
        </div>
        <div class="user-info" id="user-info">
          <span class="user-email" id="user-email">player@example.org</span>
          <button class="btn btn-sm" onclick="logout()">Exit</button>
        </div>
      </div>
    </header>

    <!-- Game Browser View -->
    <div id="view-browser" class="view active">
      <div class="browser-header">
        <h2>Game Browser</h2>
        <div class="browser-controls">
          <div class="search-box">
            <input type="text" id="game-search" placeholder="Search games..." oninput="filterGames()">
          </div>
          <select id="provider-filter" class="select-filter" onchange="filterGames()">
            <option value="all">All Providers</option>
          </select>
        </div>
      </div>
      <div class="provider-tabs" id="provider-tabs"></div>
      <div class="games-grid" id="games-grid">
        <div class="loading">Loading games...</div>
      </div>
    </div>

    <!-- Slot Machine View -->
    <div id="view-slot" class="view">
      <div class="slot-header">
        <div class="slot-game-info">
          <h2 id="slot-game-name">Select a Game</h2>
          <span class="slot-provider" id="slot-provider"></span>
        </div>
        <div class="slot-controls-top">
          <button class="btn btn-secondary" onclick="showView('browser')">← Browse Games</button>
        </div>
      </div>

      <div class="slot-machine">
        <div class="slot-screen">
          <div class="reel-container" id="reel-container">
            <div class="reel" id="reel-0">
              <div class="symbol" data-sym="1">⭐</div>
              <div class="symbol" data-sym="2">💎</div>
              <div class="symbol" data-sym="3">🍒</div>
            </div>
            <div class="reel" id="reel-1">
              <div class="symbol" data-sym="4">🍋</div>
              <div class="symbol" data-sym="5">🍊</div>
              <div class="symbol" data-sym="6">🍇</div>
            </div>
            <div class="reel" id="reel-2">
              <div class="symbol" data-sym="7">🔔</div>
              <div class="symbol" data-sym="8">🍀</div>
              <div class="symbol" data-sym="9">👑</div>
            </div>
          </div>
          <div class="reel-overlay"></div>
        </div>

        <div class="slot-info-bar">
          <div class="info-item">
            <span class="info-label">Bet</span>
            <div class="info-control">
              <button class="btn-icon" onclick="adjustBet(-1)">−</button>
              <span class="info-value" id="bet-value">1.00</span>
              <button class="btn-icon" onclick="adjustBet(1)">+</button>
            </div>
          </div>
          <div class="info-item">
            <span class="info-label">Lines</span>
            <span class="info-value" id="lines-value">5</span>
          </div>
          <div class="info-item">
            <span class="info-label">RTP</span>
            <span class="info-value" id="rtp-value">96.5%</span>
          </div>
        </div>

        <div class="slot-actions">
          <button id="spin-btn" class="btn btn-spin" onclick="spin()">
            <span class="spin-text">SPIN</span>
            <span class="spin-loader" style="display:none">⟳</span>
          </button>
        </div>
      </div>

      <!-- Win Display -->
      <div id="win-display" class="win-display" style="display:none">
        <div class="win-amount" id="win-amount">+0</div>
        <div class="win-detail" id="win-detail"></div>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
